stages:
  - test
  - build-push
  - deploy

variables:
  IMAGE_NAME: "dwkelompok2/wayshub-frontend"
  TAG: "production"

# Stage 1: Test aplikasi
test:
  stage: test
  image: node:20-alpine
  script:
    - npm install --no-audit --no-fund
    - CI=true npm test

# Stage 2: Build image dan langsung push ke Docker Hub
build-push:
  stage: build-push
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo $DOCKERHUB_PASS | docker login -u $DOCKERHUB_USER --password-stdin
    - docker build -t $IMAGE_NAME:$TAG .
    - docker push $IMAGE_NAME:$TAG

# Stage 3: Deploy ke appserver via SSH
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp $SSH_PRIVATE_KEY ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $APPSERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $APPSERVER_USER@$APPSERVER_IP "
        cd /home/kelompok2/wayshub &&
        docker compose pull frontend &&
        docker compose up -d frontend"
  after_script:
    - apk add --no-cache curl
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        curl -H "Content-Type: application/json" -X POST -d "{
          \"embeds\": [{
            \"title\": \"✅ Deploy Berhasil!\",
            \"description\": \"**wayshub-frontend** berhasil di-deploy ke production\",
            \"color\": 3066993,
            \"fields\": [
              {\"name\": \"Branch\", \"value\": \"$CI_COMMIT_BRANCH\", \"inline\": true},
              {\"name\": \"Commit\", \"value\": \"$CI_COMMIT_SHORT_SHA\", \"inline\": true},
              {\"name\": \"Pipeline\", \"value\": \"#$CI_PIPELINE_ID\", \"inline\": true}
            ]
          }]
        }" $DISCORD_WEBHOOK
      else
        curl -H "Content-Type: application/json" -X POST -d "{
          \"embeds\": [{
            \"title\": \"❌ Deploy Gagal!\",
            \"description\": \"**wayshub-frontend** gagal di-deploy\",
            \"color\": 15158332,
            \"fields\": [
              {\"name\": \"Branch\", \"value\": \"$CI_COMMIT_BRANCH\", \"inline\": true},
              {\"name\": \"Pipeline\", \"value\": \"#$CI_PIPELINE_ID\", \"inline\": true}
            ]
          }]
        }" $DISCORD_WEBHOOK
      fi